name: Deploy Dev

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: deploy-dev
  cancel-in-progress: false

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Test
        run: ./gradlew test

      - name: Build
        run: ./gradlew bootJar

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Deploy on EC2 with SSM
        env:
          MOYEO_IMAGE: ${{ steps.image.outputs.image_uri }}
          AWS_REGION: ${{ env.AWS_REGION }}
          EC2_APP_DIR: ${{ secrets.EC2_APP_DIR }}
          SPRING_PROFILES_ACTIVE: dev
          APP_PORT: ${{ secrets.APP_PORT }}
        run: |
          set -euo pipefail
          export ECR_REGISTRY="${{ steps.login-ecr.outputs.registry }}"

          python - <<'PY'
          import json
          import os

          app_dir = os.environ["EC2_APP_DIR"]
          commands = [
              "set -e",
              f"mkdir -p '{app_dir}'",
              f"test -f '{app_dir}/.env'",
              f"cat > '{app_dir}/docker-compose.yml' <<'COMPOSE_EOF'",
              "services:",
              "  app:",
              "    image: ${MOYEO_IMAGE}",
              "    container_name: moyeo-server",
              "    restart: unless-stopped",
              "    ports:",
              "      - \"${APP_PORT:-8080}:8080\"",
              "    env_file:",
              "      - .env",
              "    healthcheck:",
              "      test: [\"CMD-SHELL\", \"curl -fsS http://localhost:8080/health | grep -q OK\"]",
              "      interval: 30s",
              "      timeout: 5s",
              "      retries: 5",
              "      start_period: 30s",
              "COMPOSE_EOF",
              f"grep -q '^MOYEO_IMAGE=' '{app_dir}/.env' && sed -i 's|^MOYEO_IMAGE=.*|MOYEO_IMAGE={os.environ['MOYEO_IMAGE']}|' '{app_dir}/.env' || echo 'MOYEO_IMAGE={os.environ['MOYEO_IMAGE']}' >> '{app_dir}/.env'",
              f"grep -q '^APP_PORT=' '{app_dir}/.env' && sed -i 's|^APP_PORT=.*|APP_PORT={os.environ['APP_PORT']}|' '{app_dir}/.env' || echo 'APP_PORT={os.environ['APP_PORT']}' >> '{app_dir}/.env'",
              f"grep -q '^SPRING_PROFILES_ACTIVE=' '{app_dir}/.env' && sed -i 's|^SPRING_PROFILES_ACTIVE=.*|SPRING_PROFILES_ACTIVE={os.environ['SPRING_PROFILES_ACTIVE']}|' '{app_dir}/.env' || echo 'SPRING_PROFILES_ACTIVE={os.environ['SPRING_PROFILES_ACTIVE']}' >> '{app_dir}/.env'",
              f"aws ecr get-login-password --region '{os.environ['AWS_REGION']}' | docker login --username AWS --password-stdin '{os.environ['ECR_REGISTRY']}'",
              f"cd '{app_dir}'",
              "docker compose pull",
              "docker compose up -d",
              "docker image prune -f",
          ]

          with open("/tmp/deploy-command.json", "w", encoding="utf-8") as file:
              json.dump({"commands": commands}, file)
          PY

          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --instance-ids "$EC2_INSTANCE_ID" \
            --comment "Deploy Moyeo dev server from GitHub Actions" \
            --parameters file:///tmp/deploy-command.json \
            --query "Command.CommandId" \
            --output text)

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID"

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query '{Status:Status,StandardOutputContent:StandardOutputContent,StandardErrorContent:StandardErrorContent}' \
            --output json
