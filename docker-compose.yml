services:
  app:
    image: ${MOYEO_IMAGE}
    container_name: moyeo-server
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JUSO_SEARCH_CONFM_KEY: ${JUSO_SEARCH_CONFM_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health | grep -q OK"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
