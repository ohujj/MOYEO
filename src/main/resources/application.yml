spring:
  application:
    name: moyeo-server
  jpa:
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

springdoc:
  swagger-ui:
    path: /swagger-ui.html

moyeo:
  jwt:
    access-token-validity-seconds: 86400
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:5173
      - http://127.0.0.1:3000
      - http://127.0.0.1:5173
    allowed-methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    allowed-headers:
      - Authorization
      - Content-Type
    max-age-seconds: 3600
  address-search:
    base-url: https://business.juso.go.kr/addrlink/addrLinkApi.do
    confirmation-key: ${JUSO_SEARCH_CONFM_KEY:}
